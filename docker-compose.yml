version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite+aiosqlite:///./reservation_system.db
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
    volumes:
      - ./:/app
      - ./reservation_system.db:/app/reservation_system.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

